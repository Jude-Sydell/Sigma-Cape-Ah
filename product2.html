<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product | Sigma Cape-Ah</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="product-body">

  <header class="navbar">
    <a href="index.html" class="logo">Σ CAPE-AH</a>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="members.html">Members</a>
      <a href="highlights.html">Highlights</a>
      <a href="gear.html" class="active">Gear</a>
      <a href="operate.html">How We Operate</a>
    </nav>
  </header>

  <a href="gear.html" class="product-back">←</a>

  <main class="product-layout">

    <section class="product-left">
      <button class="product-arrow product-arrow-left" onclick="prevImage()">‹</button>

      <div class="product-image-card">
        <img id="productImage" src="images/product2.png" alt="Product Image" />
      </div>

      <button class="product-arrow product-arrow-right" onclick="nextImage()">›</button>

      <div class="product-dots">
        <button class="product-dot active" onclick="goToImage(0)"></button>
        <button class="product-dot" onclick="goToImage(1)"></button>
        <button class="product-dot" onclick="goToImage(2)"></button>
        <button class="product-dot" onclick="goToImage(3)"></button>
      </div>
    </section>

    <section class="product-info">
      <p class="product-label">SIGMA CAPE-AH GEAR</p>

      <h1>Camo Sigma Cape-Ah Hoodie</h1>

      <p class="product-price">$62.23+</p>

      <p class="product-description">
        Multiple styles of a classic camo hoodie with Sigma Cape-Ah branding.
      </p>

      <a href="https://www.etsy.com/listing/4484755070/camo-sigma-cape-ah-first-edition-hoodie?ref=shop_home_active_2&logging_key=69c4fa7053ccbeccdb8b19a26922550fcbce9029%3A4484755070" class="product-buy" target="_blank">
        Buy Now
      </a>
    </section>

  </main>

  <script>
    const images = [
      "images/product2.png",
      "images/product2.2.png",
      "images/product2.3.png",
      "images/product2.4.png"
    ];

    let currentImage = 0;

    function updateImage() {
      document.getElementById("productImage").src = images[currentImage];

      document.querySelectorAll(".product-dot").forEach((dot, index) => {
        dot.classList.toggle("active", index === currentImage);
      });
    }

    function nextImage() {
      currentImage = (currentImage + 1) % images.length;
      updateImage();
    }

    function prevImage() {
      currentImage = (currentImage - 1 + images.length) % images.length;
      updateImage();
    }

    function goToImage(index) {
      currentImage = index;
      updateImage();
    }
  </script>

</body>
</html>
